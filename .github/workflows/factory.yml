name: Strategy Factory

on:
  workflow_dispatch:

  schedule:
    # Runs every weekday at 6:15 PM IST
    - cron: "45 12 * * 1-5"

jobs:
  strategy-factory:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy

      - name: Create state directory
        run: |
          mkdir -p factory_state

      - name: Run daily arena update
        run: |
          python factory.py update

      - name: Generate weekly report (Sunday only)
        if: github.event.schedule == '45 12 * * 0'
        run: |
          python factory.py report

      - name: Commit updated state
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add factory_state

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Factory update $(date -u +'%Y-%m-%d')" || true

          for i in 1 2 3; do
            git fetch origin
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Push successful."
              exit 0
            fi

            echo "Push conflict detected. Retrying..."
            sleep 5
          done

          echo "Failed after 3 attempts."
          exit 1
        
